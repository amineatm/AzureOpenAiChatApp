  <div class="chat-wrapper">
    <div class="chat-header">Speech</div>

    <div #messagesContainer class="chat-messages">
      @for (msg of messages; track $index) {
        <div class="msg-row" [ngClass]="msg.from">
          <div class="msg-bubble" [ngClass]="msg.from">
            @if (msg.from === 'ai') {
              <div class="ai-header">
                <img src="amine.png" class="ai-avatar" alt="" />
                <span class="ai-name">Amine</span>
              </div>
            }

            <div class="msg-text-pre">{{ msg.text }}</div>

            @if (msg.audioUrl) {
              <div
                class="voice-msg"
                [class.voice-msg--playing]="isVoicePlaying($index)"
                [class.voice-msg--ai]="msg.from === 'ai'"
                [class.voice-msg--user]="msg.from === 'user'"
              >
                <button
                  type="button"
                  class="voice-msg__play"
                  (click)="toggleVoicePlayback($index)"
                  [attr.aria-label]="isVoicePlaying($index) ? 'Pause voice message' : 'Play voice message'"
                >
                  @if (isVoicePlaying($index)) {
                    <svg viewBox="0 0 24 24" class="voice-msg__glyph" aria-hidden="true">
                      <path fill="currentColor" d="M6 5h4v14H6V5zm8 0h4v14h-4V5z" />
                    </svg>
                  } @else {
                    <svg viewBox="0 0 24 24" class="voice-msg__glyph voice-msg__glyph--play" aria-hidden="true">
                      <path fill="currentColor" d="M8 5.5v13l11-6.5L8 5.5z" />
                    </svg>
                  }
                </button>

                <div class="voice-msg__track">
                  <div class="voice-msg__wave" aria-hidden="true">
                    @for (h of voiceWaveBars; track $index) {
                      <span class="voice-msg__bar" [style.height.%]="h"></span>
                    }
                  </div>
                  <div class="voice-msg__scrub" aria-hidden="true">
                    <div
                      class="voice-msg__scrub-fill"
                      [class.voice-msg__scrub-fill--on]="isVoicePlaying($index)"
                      [style.width.%]="voiceProgressPercent($index)"
                    ></div>
                  </div>
                </div>

                <span class="voice-msg__time">{{ voiceTimeLabel($index) }}</span>
              </div>
            }

            <div class="msg-meta">
              {{ msg.createdAt | date: 'short' }}
            </div>
          </div>
        </div>
      }
    </div>

    <div class="chat-input-bar">
        <div class="speech-actions">
        @if (!isRecording) {
          <button type="button" (click)="startRecording()" aria-label="Start recording">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path
                d="M12.0001 3C12.3798 3 12.6936 3.28215 12.7433 3.64823L12.7501 3.75V20.25C12.7501 20.6642 12.4143 21 12.0001 21C11.6204 21 11.3066 20.7178 11.257 20.3518L11.2501 20.25V3.75C11.2501 3.33579 11.5859 3 12.0001 3ZM8.25505 6C8.63475 6 8.94854 6.28215 8.99821 6.64823L9.00505 6.75V17.25C9.00505 17.6642 8.66927 18 8.25505 18C7.87536 18 7.56156 17.7178 7.5119 17.3518L7.50505 17.25V6.75C7.50505 6.33579 7.84084 6 8.25505 6ZM15.7452 6C16.1249 6 16.4387 6.28215 16.4883 6.64823L16.4952 6.75V17.25C16.4952 17.6642 16.1594 18 15.7452 18C15.3655 18 15.0517 17.7178 15.002 17.3518L14.9952 17.25V6.75C14.9952 6.33579 15.3309 6 15.7452 6ZM4.75122 9C5.13092 9 5.44471 9.28215 5.49437 9.64823L5.50122 9.75V14.25C5.50122 14.6642 5.16543 15 4.75122 15C4.37152 15 4.05773 14.7178 4.00807 14.3518L4.00122 14.25V9.75C4.00122 9.33579 4.33701 9 4.75122 9ZM19.2523 9C19.632 9 19.9458 9.28215 19.9955 9.64823L20.0023 9.75V14.2487C20.0023 14.6629 19.6665 14.9987 19.2523 14.9987C18.8726 14.9987 18.5588 14.7165 18.5091 14.3504L18.5023 14.2487V9.75C18.5023 9.33579 18.8381 9 19.2523 9Z"
              />
            </svg>
          </button>
        }

        @if (isRecording) {
          <button type="button" (click)="stopAndSend()" aria-label="Stop and send">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path
                d="M6 6C6 5.44772 6.44772 5 7 5H17C17.5523 5 18 5.44772 18 6V18C18 18.5523 17.5523 19 17 19H7C6.44772 19 6 18.5523 6 18V6Z"
              />
            </svg>
          </button>
        }
        </div>
      </div>
    </div>
