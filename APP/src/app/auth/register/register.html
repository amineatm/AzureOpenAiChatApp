<div class="auth-container">

  <div class="auth-card">

    <h2 class="auth-title">Create Account</h2>

    <div class="auth-fields">

      <input [(ngModel)]="name" placeholder="Name" class="auth-input" />
      @if(nameInvalid){
      <div class="text-red-500 text-sm -mt-2 mb-2">
        Name must be 4–15 characters
      </div>
      }

      <input [(ngModel)]="email" type="email" placeholder="Email" class="auth-input" />
      @if(emailInvalid){
      <div class="text-red-500 text-sm -mt-2 mb-2">
        Enter a valid email address
      </div>
      }

      <div class="password-field">
        <input [(ngModel)]="password" [type]="showPassword ? 'text' : 'password'" placeholder="Password"
          class="auth-input" />
        <button type="button" (click)="togglePasswordVisibility()" class="toggle-password-btn"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          [attr.title]="showPassword ? 'Hide password' : 'Show password'">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M12 5C6.8 5 2.36 8.24 1 12c1.36 3.76 5.8 7 11 7s9.64-3.24 11-7c-1.36-3.76-5.8-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-2.5A1.5 1.5 0 1 0 12 10a1.5 1.5 0 0 0 0 3Z"
              fill="currentColor" />
          </svg>
        </button>
      </div>
      @if(passwordInvalid){
      <div class="text-red-500 text-sm -mt-2 mb-2">
        Password must be 10–20 chars, include upper, lower, number, and special character
      </div>
      }

      <div class="password-field">
        <input [(ngModel)]="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Confirm Password" class="auth-input" />
        <button type="button" (click)="toggleConfirmPasswordVisibility()" class="toggle-password-btn"
          [attr.aria-label]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'"
          [attr.title]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M12 5C6.8 5 2.36 8.24 1 12c1.36 3.76 5.8 7 11 7s9.64-3.24 11-7c-1.36-3.76-5.8-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm0-2.5A1.5 1.5 0 1 0 12 10a1.5 1.5 0 0 0 0 3Z"
              fill="currentColor" />
          </svg>
        </button>
      </div>
      @if(passwordMismatch){
      <div class="text-red-500 text-sm -mt-2 mb-2">
        Passwords do not match
      </div>
      }

    </div>

    <button (click)="register()" class="auth-button">Register</button>

    <div class="auth-footer">
      Already have an account?
      <a routerLink="/login" class="auth-link">Login</a>
    </div>

  </div>
  
</div>
